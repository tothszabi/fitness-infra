version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: fitness_db
    restart: unless-stopped
    env_file: ../.env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command:
      - 'mysqld'
      - '--innodb-buffer-pool-size=512M'
      - '--innodb-buffer-pool-instances=1'
      - '--innodb-log-file-size=128M'
      - '--innodb-flush-method=O_DIRECT'
      - '--innodb-flush-log-at-trx-commit=2'
      - '--max-connections=50'
      - '--skip-name-resolve'
      - '--tmp-table-size=32M'
      - '--max-heap-table-size=32M'
      - '--query-cache-type=0'
      - '--performance-schema=OFF'
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: fitness_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --hz 15
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  wordpress:
    build:
      context: ./php
    container_name: fitness_php
    restart: unless-stopped
    env_file: ../.env
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_CONFIG_EXTRA: |
        define('DISABLE_WP_CRON', true);
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wp_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: fitness_nginx
    restart: unless-stopped
    volumes:
      - wp_data:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/fastcgi-cache.conf:/etc/nginx/conf.d/fastcgi-cache.conf:ro
    depends_on:
      wordpress:
        condition: service_healthy
    networks:
      - default
      - webproxy

  cron:
    image: alpine:3.21
    container_name: fitness_cron
    restart: unless-stopped
    command: >
      sh -c "while true; do
        wget -q -O /dev/null 'http://nginx/wp-cron.php?doing_wp_cron=1';
        sleep 60;
      done"
    depends_on:
      - nginx

  backup:
    build:
      context: ./scripts
    container_name: fitness_backup
    restart: unless-stopped
    env_file: ../.env
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - ./backups:/backups
      - wp_data:/var/www/html:ro
    depends_on:
      - db
    command: >
      sh -c "echo '0 3 * * * /backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root
      && crond -f -d 8"

volumes:
  db_data:
  wp_data:

networks:
  webproxy:
    external: true
